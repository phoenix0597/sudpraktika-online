services:
  zpp-site:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ${ZPP_SITE_ROOT:-./site_prototype}:/usr/share/nginx/html:ro
    expose:
      - "80"

  ddu-site:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ${DDU_SITE_ROOT:-./dist/ddu-online.ru}:/usr/share/nginx/html:ro
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - zpp-site
      - ddu-site
    environment:
      ZPP_SITE_ADDRESS: ${ZPP_SITE_ADDRESS:-:80}
      DDU_SITE_ADDRESS: ${DDU_SITE_ADDRESS:-:81}
    ports:
      - "${ZPP_DEV_HTTP_PORT:-8080}:80"
      - "${DDU_DEV_HTTP_PORT:-8081}:81"
      - "${SITE_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
