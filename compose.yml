services:
  site:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./site_prototype:/usr/share/nginx/html:ro
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - site
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${SITE_HTTP_PORT:-8080}:80"
      - "${SITE_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
